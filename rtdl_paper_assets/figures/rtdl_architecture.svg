<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
  <style>
    text { font-family: Helvetica, Arial, sans-serif; fill: #1f2430; }
    .title { font-size: 28px; font-weight: 700; }
    .subtitle { font-size: 14px; fill: #5b6270; }
    .label { font-size: 18px; font-weight: 700; }
    .body { font-size: 14px; }
    .small { font-size: 13px; fill: #4d5563; }
    .box { stroke: #aeb8c6; stroke-width: 2; rx: 14; ry: 14; }
    .arrow { stroke: #54606e; stroke-width: 3.5; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#54606e"/>
    </marker>
  </defs>

  <rect width="1200" height="1200" fill="white"/>
  <text x="40" y="44" class="title">RTDL Execution Architecture</text>
  <text x="40" y="70" class="subtitle">A single authored kernel is lowered once, then dispatched through backend-specific adapters while correctness remains externally checkable.</text>

  <rect x="40" y="130" width="250" height="150" class="box" fill="#eef4ff"/>
  <text x="62" y="162" class="label">1. Authored Kernel</text>
  <text x="62" y="194" class="body">Python-hosted RTDL surface</text>
  <text x="62" y="220" class="small">Typed inputs, probe/build roles,</text>
  <text x="62" y="240" class="small">traversal intent, refine predicate,</text>
  <text x="62" y="260" class="small">and emitted row schema.</text>

  <rect x="350" y="130" width="270" height="150" class="box" fill="#f4f8ec"/>
  <text x="372" y="162" class="label">2. Lowered Representation</text>
  <text x="372" y="194" class="body">Backend-independent kernel plan</text>
  <text x="372" y="220" class="small">Records traversal primitive,</text>
  <text x="372" y="240" class="small">predicate family, precision,</text>
  <text x="372" y="260" class="small">boundary mode, and output layout.</text>

  <line x1="290" y1="205" x2="350" y2="205" class="arrow"/>

  <rect x="680" y="96" width="460" height="240" class="box" fill="#fff7ea"/>
  <text x="702" y="128" class="label">3. Backend Adapters</text>
  <text x="702" y="158" class="body">The same lowered kernel is realized by multiple runtimes.</text>

  <rect x="708" y="186" width="122" height="110" class="box" fill="#ffffff"/>
  <text x="730" y="214" class="label" style="font-size:16px">Native Oracle</text>
  <text x="724" y="238" class="small">Semantic truth</text>
  <text x="724" y="258" class="small">Exact refine path</text>

  <rect x="850" y="186" width="122" height="110" class="box" fill="#ffffff"/>
  <text x="886" y="214" class="label" style="font-size:16px">Embree</text>
  <text x="866" y="238" class="small">CPU BVH traversal</text>
  <text x="866" y="258" class="small">Validated backend</text>

  <rect x="992" y="186" width="122" height="110" class="box" fill="#ffffff"/>
  <text x="1031" y="214" class="label" style="font-size:16px">OptiX</text>
  <text x="1008" y="238" class="small">GPU RT execution</text>
  <text x="1008" y="258" class="small">Validated backend</text>

  <line x1="620" y1="205" x2="680" y2="205" class="arrow"/>

  <rect x="90" y="400" width="310" height="150" class="box" fill="#f7f0ff"/>
  <text x="112" y="432" class="label">4. Emitted Results</text>
  <text x="112" y="464" class="body">Canonical row streams</text>
  <text x="112" y="490" class="small">Rows are normalized, ordered,</text>
  <text x="112" y="510" class="small">and hashed for exact parity checks.</text>

  <rect x="470" y="400" width="290" height="150" class="box" fill="#eef9f1"/>
  <text x="492" y="432" class="label">5. Cross-System Validation</text>
  <text x="492" y="464" class="body">Internal and external checks</text>
  <text x="492" y="490" class="small">Oracle parity across backends and</text>
  <text x="492" y="510" class="small">PostGIS validation on stable packages.</text>

  <rect x="820" y="400" width="300" height="150" class="box" fill="#eef7fb"/>
  <text x="842" y="432" class="label">6. Reported Artifacts</text>
  <text x="842" y="464" class="body">Tables, figures, and package rows</text>
  <text x="842" y="490" class="small">Only final validated artifacts are</text>
  <text x="842" y="510" class="small">included in the paper package.</text>

  <line x1="770" y1="336" x2="340" y2="400" class="arrow"/>
  <line x1="910" y1="336" x2="615" y2="400" class="arrow"/>
  <line x1="1055" y1="336" x2="970" y2="400" class="arrow"/>
  <line x1="400" y1="475" x2="470" y2="475" class="arrow"/>
  <line x1="760" y1="475" x2="820" y2="475" class="arrow"/>
</svg>
